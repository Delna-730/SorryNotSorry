<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>SorryNotSorry</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="intro">
    <div class="cinema-content">
        <h1 class="cinema-title">SorryNotSorry</h1>
        <div class="cinema-line"></div>
        <p class="cinema-sub">Because life happens… we generate excuses.</p>
    </div>
</div>

<div class="left">
    <div class="emoji-container">
        <span>😩</span><span>😤</span><span>😵</span>
        <span>🤯</span><span>😓</span><span>🙄</span>
    </div>
</div>

<div class="right">
    <div class="tag">SorryNotSorry</div>
    <h1>Oops! Need an Excuse?</h1>
    <p>Type your specific situation and select your audience.</p>

    <label>Situation:</label>
    <input type="text" id="situation" placeholder="e.g., Cat locked me in the bathroom" style="padding:12px; margin-bottom:20px; border-radius:10px; border:none; width: 100%;">

    <label>Audience:</label>
    <select id="audience">
        <option value="teacher">Teacher</option>
        <option value="boss">Boss</option>
        <option value="friend">Friend</option>
        <option value="partner">Partner</option>
    </select>

    <button class="btn" onclick="generateExcuse()">GENERATE</button>

    <div class="result" id="result"></div>
    <div class="score" id="score"></div>
</div>

<script src="script.js"></script>
</body>
</html>
